name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"

jobs:
  # ──────────────────────────────────────────────────
  # API — NestJS backend
  # ──────────────────────────────────────────────────
  api:
    name: API (lint + test + build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: markaradar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/markaradar_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-1234567890123456
      JWT_REFRESH_SECRET: ci-refresh-secret-do-not-use-in-prod-1234567890
      NODE_ENV: test
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: api/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn prisma db push --skip-generate
      - name: Lint
        run: yarn lint --max-warnings 0 || true # şu an strict değil
      - name: Type check
        run: yarn type-check 2>&1 || npx tsc --noEmit
      - name: Tests
        run: yarn test
      - name: Build
        run: yarn build

  # ──────────────────────────────────────────────────
  # Web — Next.js marketing + reader
  # ──────────────────────────────────────────────────
  web:
    name: Web (lint + type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: web/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: Type check
        run: yarn type-check
      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: http://localhost:3003

  # ──────────────────────────────────────────────────
  # Admin — Next.js panel
  # ──────────────────────────────────────────────────
  admin:
    name: Admin (lint + type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: admin/yarn.lock
      - run: yarn install --frozen-lockfile
      - name: Lint
        run: yarn lint
      - name: Type check
        run: yarn type-check
      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
