name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Deploy'leri sıraya koy, iptal etme

jobs:
  # ──────────────────────────────────────────────────────────────
  # Vercel deploy — Web + Admin (paralel)
  # ──────────────────────────────────────────────────────────────
  vercel-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'vercel' || vars.DEPLOY_WEB == 'vercel' }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm i -g vercel@latest
      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  vercel-admin:
    name: Deploy Admin → Vercel
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'vercel' || vars.DEPLOY_ADMIN == 'vercel' }}
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Railway deploy — API + Worker
  # ──────────────────────────────────────────────────────────────
  railway-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'railway' || vars.DEPLOY_API == 'railway' }}
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g @railway/cli
      - name: Run Prisma migrations
        run: railway run --service api -- yarn prisma migrate deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Self-hosted VPS (Docker Compose) — alternatif
  # ──────────────────────────────────────────────────────────────
  vps-deploy:
    name: Deploy → Self-hosted VPS
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'vps' }}
    steps:
      - uses: actions/checkout@v4
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/marketing-brand
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
            docker compose -f docker-compose.prod.yml exec -T api yarn prisma migrate deploy
            docker system prune -f
