# ═══════════════════════════════════════════════════════════════
# MarkaRadar — Nginx vhost
#
# Kurulum:
#   sudo cp nginx/markaradar.conf /etc/nginx/sites-available/markaradar
#   sudo ln -s /etc/nginx/sites-available/markaradar /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS:
#   sudo certbot --nginx \
#     -d markaradar.com \
#     -d www.markaradar.com \
#     -d api.markaradar.com \
#     -d admin.markaradar.com
#
# DNS (Cloudflare):
#   markaradar.com         A  <SUNUCU_IP>
#   www.markaradar.com     A  <SUNUCU_IP>
#   api.markaradar.com     A  <SUNUCU_IP>
#   admin.markaradar.com   A  <SUNUCU_IP>
#   (Cloudflare proxy DNS-only — certbot için)
# ═══════════════════════════════════════════════════════════════

# Limit zone (rate limit, brute force koruma)
limit_req_zone $binary_remote_addr zone=markaradar_api:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=markaradar_auth:10m rate=5r/m;

# ─────────────────────────────────────────────────
# HTTP → HTTPS redirect (Let's Encrypt webroot için /.well-known açık)
# ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name markaradar.com www.markaradar.com api.markaradar.com admin.markaradar.com;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════════════
# WEB (marketing) — markaradar.com + www
# ═══════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name markaradar.com www.markaradar.com;

    # TLS (certbot doldurur)
    ssl_certificate /etc/letsencrypt/live/markaradar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/markaradar.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # www → apex
    if ($host = www.markaradar.com) {
        return 301 https://markaradar.com$request_uri;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Body size limit
    client_max_body_size 25M;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    location ~ ^/(robots\.txt|sitemap\.xml|favicon\.ico)$ {
        proxy_pass http://127.0.0.1:3003;
        add_header Cache-Control "public, max-age=86400";
        proxy_set_header Host $host;
    }

    # Main app
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ═══════════════════════════════════════════════════
# API — api.markaradar.com
# ═══════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.markaradar.com;

    ssl_certificate /etc/letsencrypt/live/markaradar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/markaradar.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json;

    client_max_body_size 25M;

    # Auth endpoint — daha sıkı rate limit
    location ~ ^/api/v1/(auth/login|auth/register|auth/refresh) {
        limit_req zone=markaradar_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API genel
    location / {
        limit_req zone=markaradar_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ═══════════════════════════════════════════════════
# ADMIN — admin.markaradar.com
# ═══════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.markaradar.com;

    ssl_certificate /etc/letsencrypt/live/markaradar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/markaradar.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Admin için daha sıkı header'lar
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    client_max_body_size 25M;

    # Static
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
